name: Docker Publish

on:
  push:
    branches: [deployable]
  workflow_dispatch:
    inputs:
      tag:
        description: Optional additional image tag
        required: false
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build & Validate Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Docker image
        run: docker build -t taig2k/taig_service_portal_tsp:publish-ci .

      - name: Run container
        run: docker run -d --name tsp-publish-ci -p 3000:3000 taig2k/taig_service_portal_tsp:publish-ci

      - name: Wait for container
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Container ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          docker logs tsp-publish-ci
          exit 1

      - name: Route validation
        run: node scripts/smoke-test.js

      - name: Stop container
        if: always()
        run: docker rm -f tsp-publish-ci 2>/dev/null || true

  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: vars.DOCKER_PUBLISH_ENABLED == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: taig2k/taig_service_portal_tsp
          tags: |
            type=raw,value=latest
            type=raw,value=deployable
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Published tags
        run: echo "${{ steps.meta.outputs.tags }}"
